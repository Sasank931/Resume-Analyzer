<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Error | Smart Resume Analyzer</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
            <div class="col-md-8 text-center">
                <div class="card p-5 shadow-lg border-0 rounded-4">
                    <i class="bi bi-exclamation-octagon-fill text-danger display-1 mb-4"></i>
                    <h1 class="fw-bold text-dark mb-3">Oops! Something went wrong</h1>
                    <p class="text-muted fs-5 mb-5">
                        We couldn't find the page you were looking for, or an unexpected error occurred.
                    </p>
                    
                    <div th:if="${status}" class="alert alert-light border mb-4">
                        <p class="mb-1"><strong>Status:</strong> <span th:text="${status}">404</span></p>
                        <p class="mb-0"><strong>Error:</strong> <span th:text="${error}">Not Found</span></p>
                    </div>

                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-2">
                        <a href="/" class="btn btn-primary btn-lg px-4 rounded-pill shadow-sm">
                            <i class="bi bi-house-door me-2"></i> Back to Home
                        </a>
                        <a href="/about" class="btn btn-outline-secondary btn-lg px-4 rounded-pill shadow-sm">
                            <i class="bi bi-info-circle me-2"></i> About Project
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
