<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resume Analyzer & Interview Readiness</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Font Awesome (for brands) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <style>
        /* Extra inline styling for layout stability */
        .main-content {
            min-height: calc(100vh - 250px);
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-0 py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-file-earmark-person-fill me-2 fs-3"></i>
                <span class="fs-4">Smart Resume Analyzer</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house-door me-1"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about"><i class="bi bi-info-circle me-1"></i> About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/h2-console" target="_blank"><i class="bi bi-database me-1"></i> DB Console</a>
                    </li>
                    
                    <!-- Authentication Links -->
                    <li class="nav-item ms-lg-3" sec:authorize="!isAuthenticated()">
                        <a class="btn btn-outline-light px-4 rounded-pill shadow-sm" href="/login">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Login
                        </a>
                    </li>
                    
                    <li class="nav-item dropdown ms-lg-3" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-2 fs-5"></i>
                            <span sec:authentication="name" class="fw-bold">User</span>
                        </a>
                        <ul class="navbar-nav dropdown-menu dropdown-menu-end shadow border-0 mt-2 p-2 rounded-3">
                            <li>
                                <div class="px-3 py-2 border-bottom mb-2 bg-light rounded-3 text-center">
                                    <small class="text-muted d-block">Signed in as</small>
                                    <strong class="text-dark" sec:authentication="name">Admin</strong>
                                </div>
                            </li>
                            <li>
                                <form th:action="@{/logout}" method="post" id="logoutForm">
                                    <button type="submit" class="dropdown-item text-danger d-flex align-items-center py-2 rounded-2">
                                        <i class="bi bi-box-arrow-right me-2 fs-5"></i> Sign Out
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="container animate-fade-in">
            <div layout:fragment="content">
                <!-- Content will be injected here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center mt-auto">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-md-start mb-3 mb-md-0">
                    <h5 class="fw-bold mb-1">Smart Resume Analyzer System</h5>
                    <p class="footer-content mb-0">B.Tech Mini Project</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="footer-content mb-0">&copy; 2026 | Developed with <i class="bi bi-heart-fill text-danger mx-1"></i> using Java & Spring Boot</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
