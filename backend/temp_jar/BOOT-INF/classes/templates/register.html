<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Register | Smart Resume Analyzer</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-6 col-lg-4 text-center">
                <div class="card p-5 animate-fade-in border-0 shadow-lg rounded-4">
                    <!-- App Logo & Title -->
                    <div class="mb-4">
                        <i class="bi bi-person-plus-fill text-primary display-3 mb-3"></i>
                        <h2 class="fw-bold text-dark">Create Account</h2>
                        <p class="text-muted">Join the Smart Resume Analyzer community</p>
                    </div>

                    <!-- Error Feedback -->
                    <div th:if="${error}" class="alert alert-danger border-0 rounded-3 mb-4 py-2 text-start">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Error</span>
                    </div>
                    
                    <!-- Registration Form -->
                    <form th:action="@{/register}" method="post" class="text-start">
                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-bold small text-uppercase text-muted">Full Name</label>
                            <input type="text" id="fullName" name="fullName" class="form-control form-control-lg border-0 bg-light rounded-3" placeholder="Enter your full name" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold small text-uppercase text-muted">Username</label>
                            <input type="text" id="username" name="username" class="form-control form-control-lg border-0 bg-light rounded-3" placeholder="Choose a username" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold small text-uppercase text-muted">Password</label>
                            <input type="password" id="password" name="password" class="form-control form-control-lg border-0 bg-light rounded-3" placeholder="Create a password" required>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm rounded-3">
                                <i class="bi bi-check-circle me-2"></i> Register Now
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-4 pt-3 border-top">
                        <p class="mb-0 text-muted">Already have an account? <a href="/login" class="text-primary fw-bold text-decoration-none">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
