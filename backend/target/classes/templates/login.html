<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Login | Smart Resume Analyzer</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-6 col-lg-5 text-center">
                <div class="card login-card p-5 animate-fade-in">
                    <!-- App Logo & Title -->
                    <div class="mb-4">
                        <i class="bi bi-file-earmark-person-fill text-primary display-3 mb-3"></i>
                        <h1 class="fw-bold text-dark">Smart Resume Analyzer</h1>
                        <p class="text-muted fs-5">Login to analyze your resume.</p>
                    </div>

                    <!-- Logout Feedback -->
                    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center mb-4 border-0 rounded-3 shadow-sm py-3 text-start" role="alert">
                        <i class="bi bi-check-circle-fill me-3 fs-4"></i>
                        <div class="fw-bold">You have been successfully logged out.</div>
                    </div>
                    
                    <!-- Login Button -->
                    <div class="d-grid gap-3 mt-4">
                        <a th:href="@{/oauth2/authorization/google}" class="btn-google text-decoration-none shadow-sm">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo">
                            <span>Sign in with Google</span>
                        </a>
                    </div>
                    
                    <div class="mt-5 pt-4 border-top text-muted">
                        <p class="small mb-2">B.Tech Mini Project 2026</p>
                        <p class="small mb-0 text-primary fw-semibold">Smart Resume Analyzer System</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
