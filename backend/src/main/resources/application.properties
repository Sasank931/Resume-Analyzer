spring.application.name=resume-analyzer

# Dynamic port for cloud deployment
server.port=${PORT:8080}

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:resume_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console Configuration (Disabled for production)
spring.h2.console.enabled=false

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Logging Configuration
logging.level.root=INFO
logging.level.com.resume.analyzer=INFO

# Thymeleaf Configuration (Optional if using React, but included as per requirements)
spring.thymeleaf.cache=false
